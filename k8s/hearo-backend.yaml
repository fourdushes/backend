apiVersion: apps/v1
kind: Deployment
metadata:
  name: hearo-backend
  labels:
    app: hearo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hearo-backend
  template:
    metadata:
      labels:
        app: hearo-backend
    spec:
      containers:
        - name: hearo-backend
          # GitHub Actions에서 새 commit SHA 태그로 변경합니다.
          image: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/hearo-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: db-url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: db-password
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: JPA_DDL_AUTO
              value: update
            - name: JPA_SHOW_SQL
              value: "false"
            - name: AWS_REGION
              value: ap-northeast-2
            - name: AWS_S3_BUCKET
              value: hearo-s3-bucket
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: mail-username
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: mail-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: jwt-secret
            - name: CLOVA_SPEECH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: clova-speech-secret
            - name: CLOVA_SPEECH_INVOKE_URL
              valueFrom:
                secretKeyRef:
                  name: hearo-backend-secret
                  key: clova-speech-invoke-url
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: hearo-backend
  labels:
    app: hearo-backend
spec:
  type: NodePort
  selector:
    app: hearo-backend
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30111
