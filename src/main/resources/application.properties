spring.application.name=hearo

spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=${SERVER_PORT:8081}

jwt.secret=${JWT_SECRET:dev-only-jwt-secret-change-this-before-production-1234567890}
jwt.validity-in-milliseconds=${JWT_VALIDITY:172800000}
jwt.refresh-token-validity-in-milliseconds=${JWT_REFRESH_VALIDITY:1209600000}

# AWS S3 ́„¤́ •
aws.s3.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:hearo-s3-bucket}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/hearO}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root1234}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# CLOVA Speech
clova.speech.secret=${CLOVA_SPEECH_SECRET:}
clova.speech.invoke-url=${CLOVA_SPEECH_INVOKE_URL:}
